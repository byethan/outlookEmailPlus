<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱池助手 - UI Preview</title>
  <style>
    /* ── 设计 Token（与主应用 main.css 对齐） ── */
    :root {
      --clr-primary:       #B85C38;
      --clr-primary-dark:  #8E3E22;
      --clr-primary-light: #D4795A;
      --clr-accent:        #C8963E;
      --clr-jade:          #3A7D44;
      --clr-jade-dark:     #2D6035;
      --clr-danger:        #C0392B;
      --clr-warn:          #E67E22;

      --bg:           #F5EDE0;
      --bg-card:      #FDFAF5;
      --bg-sidebar:   #2C1A0E;
      --text:         #2C1810;
      --text-sec:     #6B4226;
      --text-muted:   #9E7A5A;
      --border:       #D9C4A8;
      --border-light: #EDE0CE;
      --shadow:       rgba(44,24,16,.12);
      --shadow-md:    rgba(44,24,16,.18);

      --font: 'PingFang SC','Noto Sans SC','Microsoft YaHei',system-ui,sans-serif;
      --radius: 8px;
      --radius-sm: 5px;
      --transition: .2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: #DDD0C4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px 100px;
      min-height: 100vh;
    }

    /* ── Popup Shell ── */
    .popup {
      width: 380px;
      background: var(--bg);
      border-radius: 12px;
      box-shadow: 0 8px 32px var(--shadow-md);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ── Header ── */
    .header {
      background: var(--bg-sidebar);
      padding: 12px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .logo-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-accent));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(184,92,56,.4);
    }
    .logo-text { color: #FAEBD7; font-size: 14px; font-weight: 700; letter-spacing: .02em; }
    .logo-sub  { color: rgba(250,235,215,.45); font-size: 11px; margin-top: 1px; }
    .header-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius-sm);
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(250,235,215,.65);
      font-size: 14px;
      transition: background var(--transition);
    }
    .header-btn:hover { background: rgba(255,255,255,.16); color: #FAEBD7; }

    /* ── Content ── */
    .content { padding: 14px; }
    .state-empty, .state-task, .state-settings { display: none; }
    .state-empty.active, .state-task.active, .state-settings.active { display: block; }

    /* ── Empty State ── */
    .empty-hint {
      text-align: center;
      padding: 8px 6px 2px;
      color: var(--text-muted);
      font-size: 12.5px;
      line-height: 1.65;
    }
    .empty-icon { font-size: 34px; margin-bottom: 6px; }

    /* ── Form ── */
    .form-group { margin-top: 11px; }
    .form-label {
      display: block;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-sec);
      margin-bottom: 4px;
    }
    .form-input {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus {
      border-color: var(--clr-primary);
      box-shadow: 0 0 0 3px rgba(184,92,56,.14);
    }
    .form-input::placeholder { color: var(--border); }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 8.5px 13px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all var(--transition);
      margin-top: 7px;
      white-space: nowrap;
    }
    .btn-primary   { background: var(--clr-primary); color: #fff; }
    .btn-primary:hover   { background: var(--clr-primary-dark); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(184,92,56,.3); }
    .btn-jade      { background: var(--clr-jade); color: #fff; }
    .btn-jade:hover      { background: var(--clr-jade-dark); transform: translateY(-1px); }
    .btn-outline   { background: transparent; color: var(--clr-primary); border: 1px solid var(--clr-primary-light); }
    .btn-outline:hover   { background: rgba(184,92,56,.06); }
    .btn-danger-outline  { background: transparent; color: var(--clr-danger); border: 1px solid rgba(192,57,43,.35); }
    .btn-danger-outline:hover { background: rgba(192,57,43,.06); }
    .btn-ghost     { background: var(--border-light); color: var(--text-sec); border: 1px solid var(--border); }
    .btn-ghost:hover     { background: var(--border); color: var(--text); }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 7px; }
    .btn-row .btn { margin-top: 0; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* ── Email Card ── */
    .email-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 13px;
      margin-bottom: 11px;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .card-label {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 5px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 100px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .badge-waiting { background: rgba(200,150,62,.12); color: var(--clr-accent); border: 1px solid rgba(200,150,62,.25); }
    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .email-row { display: flex; align-items: center; gap: 7px; }
    .email-address { flex: 1; font-size: 12.5px; font-weight: 600; color: var(--text); word-break: break-all; }
    .btn-copy {
      flex-shrink: 0;
      background: rgba(184,92,56,.1);
      border: 1px solid rgba(184,92,56,.2);
      border-radius: var(--radius-sm);
      padding: 3px 8px;
      cursor: pointer;
      color: var(--clr-primary);
      font-size: 11.5px;
      font-family: var(--font);
      white-space: nowrap;
      transition: background var(--transition);
    }
    .btn-copy:hover  { background: rgba(184,92,56,.18); }
    .btn-copy.copied { background: rgba(58,125,68,.12); border-color: rgba(58,125,68,.25); color: var(--clr-jade); }

    /* ── Result Box ── */
    .result-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--clr-primary);
      border-radius: var(--radius);
      padding: 11px 13px;
      margin-top: 9px;
      display: none;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .result-box.show { display: block; }
    .result-label { font-size: 10.5px; font-weight: 600; color: var(--clr-primary); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
    .result-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .result-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .14em;
      word-break: break-all;
    }
    .result-value.link-mode { font-size: 11px; letter-spacing: 0; color: var(--clr-primary); }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border-light); margin: 11px 0; }

    /* ── Settings ── */
    .settings-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .settings-group { margin-bottom: 10px; }

    /* ── Spinner ── */
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    .spinner-brown { border-color: rgba(184,92,56,.25); border-top-color: var(--clr-primary); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── History ── */
    .history-section { border-top: 1px solid var(--border-light); }
    .history-header {
      padding: 9px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }
    .history-header:hover { background: var(--border-light); }
    .history-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-sec);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .history-count {
      background: var(--border);
      color: var(--text-muted);
      font-size: 10.5px;
      padding: 1px 6px;
      border-radius: 100px;
    }
    .history-caret { color: var(--text-muted); font-size: 10px; transition: transform .2s; }
    .history-caret.open { transform: rotate(180deg); }
    .history-list { padding: 0 14px 12px; display: none; }
    .history-list.open { display: block; }
    .history-item {
      padding: 8px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      font-size: 11.5px;
    }
    .history-item:last-child { margin-bottom: 0; }
    .history-email { font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .history-meta { color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .history-code  { color: var(--clr-primary); font-weight: 600; }
    .status-done    { color: var(--clr-jade); }
    .status-release { color: var(--clr-warn); }

    /* ── Preview Bar ── */
    .preview-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-sidebar);
      padding: 7px 14px;
      border-radius: 24px;
      font-size: 12px;
      display: flex;
      gap: 5px;
      align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.08);
    }
    .preview-bar > span { color: rgba(250,235,215,.35); margin-right: 2px; font-size: 11px; }
    .ps-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 3px 11px;
      color: rgba(250,235,215,.55);
      font-size: 11.5px;
      font-family: var(--font);
      cursor: pointer;
      transition: all .18s;
    }
    .ps-btn:hover  { background: rgba(255,255,255,.14); color: #FAEBD7; }
    .ps-btn.active { background: var(--clr-primary); border-color: var(--clr-primary); color: #fff; }
  </style>
</head>
<body>

<!-- ════════════════════ Popup ════════════════════ -->
<div class="popup">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <div class="logo-mark">📬</div>
      <div>
        <div class="logo-text">邮箱池助手</div>
        <div class="logo-sub">OutlookMail Plus</div>
      </div>
    </div>
    <button class="header-btn" title="设置" onclick="previewState('settings')">⚙</button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- ① 无任务状态 -->
    <div class="state-empty active" id="state-empty">
      <div class="empty-hint">
        <div class="empty-icon">📬</div>
        <div>暂无进行中的申领任务<br>从邮箱池申领一个邮箱开始使用</div>
      </div>
      <div class="form-group">
        <label class="form-label">项目 Key（可选）</label>
        <input class="form-input" type="text" id="project-key-input" placeholder="e.g. OpenAI / Grok / Claude">
      </div>
      <button class="btn btn-primary" id="btn-claim" onclick="doClaimEmail()">
        <span>📧</span> 申领邮箱
      </button>
    </div>

    <!-- ② 有任务状态 -->
    <div class="state-task" id="state-task">
      <div class="email-card">
        <div class="card-label">当前申领邮箱</div>
        <div class="status-badge badge-waiting">
          <span class="badge-dot"></span>等待使用
        </div>
        <div class="email-row">
          <span class="email-address" id="current-email">pool_abc7f2@outlook.com</span>
          <button class="btn-copy" id="btn-copy-email"
            onclick="copyText(document.getElementById('current-email').innerText,'btn-copy-email')">📋 复制</button>
        </div>
      </div>

      <button class="btn btn-outline" id="btn-get-code" onclick="doGetCode()">
        <span>🔢</span> 获取最新验证码
      </button>
      <button class="btn btn-ghost" id="btn-get-link" onclick="doGetLink()" style="margin-top:6px">
        <span>🔗</span> 获取验证链接
      </button>

      <!-- 结果展示框 -->
      <div class="result-box" id="result-box">
        <div class="result-label" id="result-label">验证码</div>
        <div class="result-row">
          <span class="result-value" id="result-value">482910</span>
          <button class="btn-copy" id="btn-copy-result"
            onclick="copyText(document.getElementById('result-value').innerText,'btn-copy-result')">📋 复制</button>
        </div>
      </div>

      <hr class="divider">
      <div class="btn-row">
        <button class="btn btn-jade" id="btn-complete" onclick="doComplete()">✅ 完成（成功）</button>
        <button class="btn btn-danger-outline" id="btn-release" onclick="doRelease()">↩ 释放邮箱</button>
      </div>
    </div>

    <!-- ③ 设置面板 -->
    <div class="state-settings" id="state-settings">
      <div class="settings-title">⚙️ 服务配置</div>
      <div class="settings-group">
        <label class="form-label">服务器地址</label>
        <input class="form-input" type="url" id="cfg-server"
          placeholder="https://your-server.com"
          value="http://localhost:5001">
      </div>
      <div class="settings-group">
        <label class="form-label">API Key（X-API-Key）</label>
        <input class="form-input" type="password" id="cfg-apikey"
          placeholder="your-api-key-here"
          value="sk-example-key-demo">
      </div>
      <div class="settings-group">
        <label class="form-label">默认项目 Key（可选）</label>
        <input class="form-input" type="text" id="cfg-project"
          placeholder="留空则不传 project_key">
      </div>
      <button class="btn btn-primary" id="btn-save" onclick="saveSettings()">💾 保存配置</button>
      <button class="btn btn-ghost" onclick="previewState('empty')" style="margin-top:6px">← 返回</button>
    </div>

  </div><!-- /content -->

  <!-- History -->
  <div class="history-section">
    <div class="history-header" onclick="toggleHistory()">
      <div class="history-title">
        📋 历史记录
        <span class="history-count" id="history-count">3</span>
      </div>
      <span class="history-caret" id="history-caret">▼</span>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-item">
        <div class="history-email">user_openai_7f2a@outlook.com</div>
        <div class="history-meta">
          <span>今天 12:34</span>
          <span class="history-code">验证码: 394821</span>
          <span class="status-done">✅ 完成</span>
        </div>
      </div>
      <div class="history-item">
        <div class="history-email">mail_reg_c8d1@hotmail.com</div>
        <div class="history-meta">
          <span>今天 11:02</span>
          <span class="history-code">🔗 链接已提取</span>
          <span class="status-done">✅ 完成</span>
        </div>
      </div>
      <div class="history-item">
        <div class="history-email">test_pool_bb91@outlook.com</div>
        <div class="history-meta">
          <span>今天 09:15</span>
          <span style="color:var(--border)">（未获取验证码）</span>
          <span class="status-release">↩ 已释放</span>
        </div>
      </div>
    </div>
  </div>

</div><!-- /popup -->

<!-- Preview State Bar -->
<div class="preview-bar">
  <span>预览：</span>
  <button class="ps-btn active" id="ps-empty"    onclick="previewState('empty')">无任务</button>
  <button class="ps-btn"        id="ps-task"     onclick="previewState('task')">申领中</button>
  <button class="ps-btn"        id="ps-result"   onclick="previewState('result')">有验证码</button>
  <button class="ps-btn"        id="ps-link"     onclick="previewState('link')">有链接</button>
  <button class="ps-btn"        id="ps-settings" onclick="previewState('settings')">设置</button>
</div>

<script>
  let historyOpen = false;

  function switchContent(name) {
    ['empty','task','settings'].forEach(s =>
      document.getElementById('state-' + s).classList.remove('active'));
    document.getElementById('result-box').classList.remove('show');
    if (name) document.getElementById('state-' + name).classList.add('active');
  }

  function setPreviewActive(id) {
    document.querySelectorAll('.ps-btn').forEach(b => b.classList.remove('active'));
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
  }

  function previewState(s) {
    setPreviewActive('ps-' + s);
    if      (s === 'empty')    { switchContent('empty'); }
    else if (s === 'task')     { switchContent('task'); }
    else if (s === 'result')   { switchContent('task'); showResult('验证码', '482910', false); }
    else if (s === 'link')     { switchContent('task'); showResult('验证链接', 'https://accounts.openai.com/verify?token=abc123xyz456', true); }
    else if (s === 'settings') { switchContent('settings'); }
  }

  function showResult(label, value, isLink) {
    const val = document.getElementById('result-value');
    document.getElementById('result-label').innerText = label;
    val.innerText = value;
    val.classList.toggle('link-mode', isLink);
    document.getElementById('result-box').classList.add('show');
  }

  function doClaimEmail() {
    const btn = document.getElementById('btn-claim');
    btn.innerHTML = '<div class="spinner"></div> 申领中…';
    btn.disabled = true;
    setTimeout(() => {
      const rand = Math.random().toString(36).slice(2, 8);
      document.getElementById('current-email').innerText = 'pool_' + rand + '@outlook.com';
      switchContent('task');
      setPreviewActive('ps-task');
      btn.innerHTML = '<span>📧</span> 申领邮箱';
      btn.disabled = false;
    }, 1200);
  }

  function doGetCode() {
    const btn = document.getElementById('btn-get-code');
    btn.innerHTML = '<div class="spinner spinner-brown"></div> 等待邮件…';
    btn.disabled = true;
    setTimeout(() => {
      showResult('验证码', Math.floor(100000 + Math.random() * 900000).toString(), false);
      btn.innerHTML = '<span>🔢</span> 获取最新验证码';
      btn.disabled = false;
    }, 1500);
  }

  function doGetLink() {
    const btn = document.getElementById('btn-get-link');
    btn.innerHTML = '<div class="spinner" style="border-color:rgba(107,66,38,.2);border-top-color:#6B4226"></div> 获取中…';
    btn.disabled = true;
    setTimeout(() => {
      showResult('验证链接', 'https://accounts.openai.com/verify?token=abc123xyz456', true);
      btn.innerHTML = '<span>🔗</span> 获取验证链接';
      btn.disabled = false;
    }, 1200);
  }

  function doComplete() {
    const btn = document.getElementById('btn-complete');
    btn.innerHTML = '⏳ 处理中…'; btn.disabled = true;
    setTimeout(() => {
      const c = document.getElementById('history-count');
      c.innerText = (parseInt(c.innerText) + 1).toString();
      switchContent('empty'); setPreviewActive('ps-empty');
      btn.innerHTML = '✅ 完成（成功）'; btn.disabled = false;
    }, 800);
  }

  function doRelease() {
    const btn = document.getElementById('btn-release');
    btn.innerHTML = '⏳ 释放中…'; btn.disabled = true;
    setTimeout(() => {
      switchContent('empty'); setPreviewActive('ps-empty');
      btn.innerHTML = '↩ 释放邮箱'; btn.disabled = false;
    }, 800);
  }

  function saveSettings() {
    const btn = document.getElementById('btn-save');
    btn.innerHTML = '✅ 已保存！'; btn.disabled = true;
    btn.style.background = '#3A7D44';
    setTimeout(() => {
      btn.innerHTML = '💾 保存配置';
      btn.disabled = false;
      btn.style.background = '';
      previewState('empty');
    }, 1100);
  }

  function toggleHistory() {
    historyOpen = !historyOpen;
    document.getElementById('history-list').classList.toggle('open', historyOpen);
    document.getElementById('history-caret').classList.toggle('open', historyOpen);
  }

  function copyText(text, btnId) {
    navigator.clipboard.writeText(text).catch(() => {});
    const btn = document.getElementById(btnId);
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1400);
  }
