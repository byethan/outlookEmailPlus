name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
      - master
      - dev          # dev 分支自动构建 :dev 标签
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'templates/**'
      - 'static/**'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: "额外推送的镜像标签，例如 v2.0.0-byethan.1；留空则只用分支/tag/sha 规则"
        required: false
        default: ""
      push_latest:
        description: "是否同时推送 latest"
        required: true
        type: boolean
        default: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy bandit[toml]

      - name: Run formatter checks
        run: |
          black --check outlook_web tests web_outlook_app.py outlook_mail_reader.py start.py
          isort --check-only --profile black outlook_web tests web_outlook_app.py outlook_mail_reader.py start.py

      - name: Run static analysis gate
        run: |
          flake8 outlook_web tests web_outlook_app.py outlook_mail_reader.py start.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 outlook_web/repositories/settings.py outlook_web/services/external_api.py outlook_web/controllers/system.py web_outlook_app.py --count --max-complexity=10 --max-line-length=127 --statistics
          mypy --config-file pyproject.toml outlook_web/repositories/settings.py outlook_web/services/external_api.py outlook_web/controllers/system.py web_outlook_app.py

      - name: Run security gate
        run: bandit -r outlook_web web_outlook_app.py outlook_mail_reader.py start.py -lll

      - name: Run publish gate tests
        run: python -m unittest discover -s tests -v

  build-and-push:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
          INPUT_PUSH_LATEST: ${{ github.event.inputs.push_latest || 'false' }}
        run: |
          # GHCR 要求小写
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/outlook-email-plus"
          tags=()

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tags+=("${image}:${GITHUB_REF_NAME}")
          elif [[ -n "${INPUT_IMAGE_TAG}" ]]; then
            tags+=("${image}:${INPUT_IMAGE_TAG}")
          else
            safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '/[:upper:]' '-[:lower:]')"
            tags+=("${image}:${safe_ref}")
          fi

          short_sha="${GITHUB_SHA::7}"
          safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '/[:upper:]' '-[:lower:]')"
          tags+=("${image}:${safe_ref}-${short_sha}")

          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" || "${INPUT_PUSH_LATEST}" == "true" ]]; then
            tags+=("${image}:latest")
          fi

          printf "tags<<EOF\n" >> "$GITHUB_OUTPUT"
          printf "%s\n" "${tags[@]}" >> "$GITHUB_OUTPUT"
          printf "EOF\n" >> "$GITHUB_OUTPUT"
          printf "%s\n" "${tags[@]}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}
