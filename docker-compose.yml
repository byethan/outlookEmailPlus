services:
  app:
    # 默认拉取 byethan fork 的 GHCR 镜像。
    # 镜像标签可通过 .env 的 IMAGE_TAG 控制，生产环境建议固定版本标签。
    image: ghcr.io/byethan/outlook-email-plus:${IMAGE_TAG:-latest}

    # 模式二（开发者）：本地构建（取消注释 build，并按需注释 image）
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: outlook-email-plus

    # 主机侧端口（默认 5001，避免与本机 5000 冲突）
    # 默认只绑定 VPS 本机，配合 SSH 隧道访问，避免直接暴露公网。
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-5001}:5000"

    # 从 .env 注入所有环境变量（避免在 compose 里硬编码）
    env_file:
      - .env

    # 仅保留"必须项"强校验
    environment:
      SECRET_KEY: "${SECRET_KEY:?请在 .env 中设置 SECRET_KEY（必须稳定，用于加密数据库敏感信息）}"
      # OAuth Token 工具（可选；如需显式覆盖，可在 .env 中配置下列变量）
      # OAUTH_TOOL_ENABLED: "true"
      # OAUTH_CLIENT_ID: ""
      # OAUTH_CLIENT_SECRET: ""
      # OAUTH_REDIRECT_URI: ""
      # OAUTH_SCOPE: "offline_access https://outlook.office.com/IMAP.AccessAsUser.All"
      # Graph 仅为可选扩展："offline_access https://graph.microsoft.com/.default"
      # OAUTH_TENANT: "consumers"
      # Docker API 自更新（可选，高级功能；需同时取消下方 docker.sock 挂载注释）
      DOCKER_SELF_UPDATE_ALLOW: "${DOCKER_SELF_UPDATE_ALLOW:-false}"

    volumes:
      - ./data:/app/data
      - ./.runtime:/app/.runtime
      - ./plugins:/app/plugins

    restart: unless-stopped

    # 防止日志无限增长打满磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request as u; u.urlopen('http://localhost:5000/healthz', timeout=4).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - outlook-net

networks:
  outlook-net:
    driver: bridge
